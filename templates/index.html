{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Add Recipe Form -->
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">Add New Recipe</h5>
            </div>
            <div class="card-body">
                <form id="recipeForm">
                    <div class="mb-3">
                        <label for="name" class="form-label">Recipe Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>

                    <!-- Category (Single Select) -->
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select" id="category">
                            <!-- Options populated by JavaScript -->
                        </select>
                    </div>

                    <!-- Tags (Multiple) -->
                    <div class="mb-3">
                        <label class="form-label">Tags</label>
                        <div id="tagsContainer" class="d-flex flex-wrap gap-2 mb-2"></div>
                        <div class="input-group">
                            <input type="text" class="form-control" id="tagInput" placeholder="Add tag...">
                            <button class="btn btn-outline-secondary" type="button" onclick="addTag()">+</button>
                        </div>
                    </div>
                    
                    <hr>
                    <h6>Instructions</h6>
                    <div id="instructionsList" class="mb-3"></div>

                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="taskDesc" placeholder="Task description (e.g., 'Preheat oven to 350°F')">
                        <button class="btn btn-outline-secondary" type="button" onclick="addTask()">+</button>
                    </div>

                    <hr>
                    <h6>Ingredients</h6>
                    <div id="ingredientsList" class="mb-3"></div>
                    
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="ingName" placeholder="Name (e.g. Flour)">
                        <input type="number" class="form-control" id="ingQty" placeholder="Qty" style="max-width: 80px;">
                        <input type="text" class="form-control" id="ingUnit" placeholder="Unit (e.g. g)" style="max-width: 80px;">
                        <button class="btn btn-outline-secondary" type="button" onclick="addIngredient()">+</button>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Save Recipe</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Right Column: Recipe List -->
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Your Recipes</h5>
                <button class="btn btn-sm btn-outline-primary" onclick="loadRecipes()">Refresh</button>
            </div>
            <div class="mb-3">
                <select class="form-select" id="categoryFilter" onchange="filterByCategory()">
                    <!-- Options populated by JavaScript -->
                </select>
            </div>
            <div class="mb-3">
                <div class="input-group">
                    <input type="text" class="form-control" id="ingredientSearch" placeholder="e.g., cabbage, potatoes">
                    <button class="btn btn-outline-primary" type="button" onclick="searchByIngredient()">Search</button>
                </div>
                <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" id="matchAllCheckbox">
                    <label class="form-check-label" for="matchAllCheckbox">Match ALL ingredients (AND)</label>
                </div>
                <small class="text-muted">Leave unchecked for OR logic (show recipes with any ingredient)</small>
            </div>
            <div class="mb-3">
                <div id="tagFilterContainer" class="d-flex flex-wrap gap-2">
                    <!-- Tag buttons will be injected here by JS -->
                    <span class="badge bg-secondary">No tags yet</span>
                </div>
                <button class="btn btn-sm btn-outline-danger mt-2" onclick="clearTagFilters()" style="display:none;" id="clearTagFiltersBtn">Clear Filters</button>
            </div>
            <div class="card-body" id="recipesContainer">
                <p class="text-muted text-center">Loading recipes...</p>
            </div>
        </div>
    </div>


    <!-- Recipe Detail Modal -->
    <div class="modal fade" id="recipeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Recipe Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <p>Loading...</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-warning" id="editBtn">Edit</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-danger" id="deleteBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

<script>
    let ingredients = [];
    let instructions = [];
    let editingRecipeId = null;
    let tags = [];
    let selectedTags = []; // State to hold selected tags

    // Fixed categories - define ONCE here
    const FIXED_CATEGORIES = [
        "Sauces",
        "Hot Sauces",
        "Salads",
        "Main Course",
        "Desserts",
        "Breakfast",
        "Snacks",
        "Drinks",
        "Other"
    ];

   document.addEventListener('DOMContentLoaded', function() {
        // Populate both dropdowns from single source
        populateCategoryDropdown('category');
        populateCategoryDropdown('categoryFilter');
        
        // Initialize Sortable
        const listDiv = document.getElementById('instructionsList');
        if (listDiv) {
            Sortable.create(listDiv, {
                animation: 150,
                onEnd: function(evt) {
                    const item = instructions.splice(evt.oldIndex, 1)[0];
                    instructions.splice(evt.newIndex, 0, item);
                }
            });
        }
        
        // Attach form submit handler
        const form = document.getElementById('recipeForm');
        if (form) {
            form.addEventListener('submit', saveRecipe);
        }
        
        // Load recipes on start
        loadRecipes();
    });

    function addTask() {
        const desc = document.getElementById('taskDesc').value;
        
        if (!desc.trim()) return alert("Enter a task description");
        
        instructions.push(desc.trim());
        renderInstructions();
        document.getElementById('taskDesc').value = '';
    }

    function removeTask(index) {
        instructions.splice(index, 1);
        renderInstructions();
    }

    function renderInstructions() {
        const listDiv = document.getElementById('instructionsList');
        if (!listDiv) return;
        
        listDiv.innerHTML = instructions.map((task, idx) => 
            `<div class="d-flex justify-content-between align-items-center mb-2 p-2 bg-light rounded">
                <span class="fw-bold me-2">${idx + 1}.</span>
                <span>${task}</span>
                <button class="btn btn-sm btn-danger" onclick="removeTask(${idx})">&times;</button>
            </div>`
        ).join('');
    }

    function addIngredient() {
        const name = document.getElementById('ingName').value;
        const qty = document.getElementById('ingQty').value;
        const unit = document.getElementById('ingUnit').value;

        if (!name) return alert("Please add ingredient name");
        if (!unit) return alert("Please add unit");

        // Handle optional quantity
        const quantity = qty ? parseFloat(qty) : null;

        ingredients.push({ name, quantity, unit });
        
        const listDiv = document.getElementById('ingredientsList');
        listDiv.innerHTML = ingredients.map((ing, idx) => {
            // Display quantity only if it exists
            const qtyDisplay = ing.quantity !== null ? `${ing.quantity} ` : '';
            return `<div class="d-flex justify-content-between align-items-center mb-1">
                <span>${qtyDisplay}${ing.unit} ${ing.name}</span>
                <button class="btn btn-sm btn-danger" onclick="removeIngredient(${idx})">&times;</button>
            </div>`;
        }).join('');

        document.getElementById('ingName').value = '';
        document.getElementById('ingQty').value = '';
        document.getElementById('ingUnit').value = '';
    }

    function removeIngredient(index) {
        ingredients.splice(index, 1);
        addIngredient();
    }

    function addTag() {
        const input = document.getElementById('tagInput');
        const tag = input.value.trim();
        if (tag && !tags.includes(tag)) {
            tags.push(tag);
            renderTags();
            input.value = '';
        }
    }

    function removeTag(index) {
        tags.splice(index, 1);
        renderTags();
    }

    function renderTags() {
        const container = document.getElementById('tagsContainer');
        container.innerHTML = tags.map((tag, idx) => 
            `<span class="badge bg-primary">
                ${tag}
                <button type="button" class="btn-close btn-close-white ms-1" 
                        onclick="removeTag(${idx})"></button>
            </span>`
        ).join('');
    }

    function populateCategoryDropdown(selectElementId) {
        const select = document.getElementById(selectElementId);
        if (!select) return;
        
        // Clear existing options (except first if you want to keep placeholder)
        select.innerHTML = '<option value="">Select category...</option>';
        
        // Populate from FIXED_CATEGORIES
        FIXED_CATEGORIES.forEach(cat => {
            select.innerHTML += `<option value="${cat}">${cat}</option>`;
        });
    }

    async function filterByCategory() {
        const category = document.getElementById('categoryFilter').value;
        const url = category ? `/recipes?category=${encodeURIComponent(category)}` : '/recipes';
        
        try {
            const res = await fetch(url);
            const recipes = await res.json();
            const container = document.getElementById('recipesContainer');
            
            if (recipes.length === 0) {
                container.innerHTML = '<p class="text-center text-muted">No recipes found.</p>';
                return;
            }

            // Reuse the same rendering logic from loadRecipes
            container.innerHTML = recipes.map(r => `
                <div class="card mb-3 border-0 bg-light recipe-card" data-id="${r.id}" style="cursor: pointer;">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title mb-1">${r.name}</h5>
                            ${r.category ? `<span class="badge bg-secondary">${r.category}</span>` : ''}
                        </div>
                        <div class="d-flex flex-wrap gap-1 mb-2">
                            ${r.tags && r.tags.length > 0 ? r.tags.map(t => `<span class="badge bg-info text-dark" style="font-size: 0.7em;">${t}</span>`).join('') : ''}
                        </div>
                        <p class="card-text text-muted small">${r.instructions[0]?.substring(0, 100) || ''}...</p>
                        <small class="text-primary">${r.ingredients.length} ingredients</small>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.recipe-card').forEach(card => {
                card.addEventListener('click', () => openRecipe(card.dataset.id));
            });
        } catch (err) {
            document.getElementById('recipesContainer').innerHTML = '<p class="text-danger">Error loading recipes.</p>';
        }
    }

    async function loadRecipes() {
        try {
            const res = await fetch('/recipes');
            const recipes = await res.json();
            const container = document.getElementById('recipesContainer');
            
            // 1. Extract all unique tags
            const allTags = new Set();
            recipes.forEach(r => {
                if (r.tags) {
                    r.tags.forEach(t => allTags.add(t));
                }
            });
            
            // 2. Build Tag Filter Buttons
            const filterContainer = document.getElementById('tagFilterContainer');
            const clearBtn = document.getElementById('clearTagFiltersBtn');
            
            if (allTags.size === 0) {
                filterContainer.innerHTML = '<span class="text-muted small">No tags available</span>';
                clearBtn.style.display = 'none';
            } else {
                filterContainer.innerHTML = '';
                allTags.forEach(tag => {
                    const btn = document.createElement('button');
                    btn.className = 'badge bg-light text-dark border';
                    btn.textContent = tag;
                    btn.onclick = () => toggleTagFilter(tag, btn);
                    filterContainer.appendChild(btn);
                });
                clearBtn.style.display = 'none'; // Hidden until a filter is active
            }

            // 3. Render Recipes (Initial load)
            renderRecipeList(recipes);

        } catch (err) {
            document.getElementById('recipesContainer').innerHTML = '<p class="text-danger">Error loading recipes.</p>';
        }
    }

    // Helper to render the list (used by loadRecipes and filter)
    function renderRecipeList(recipes) {
        const container = document.getElementById('recipesContainer');
        
        if (recipes.length === 0) {
            container.innerHTML = '<p class="text-center text-muted">No recipes found.</p>';
            return;
        }

        container.innerHTML = recipes.map(r => `
            <div class="card mb-3 border-0 bg-light recipe-card" data-id="${r.id}" style="cursor: pointer;">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title mb-1">${r.name}</h5>
                        ${r.category ? `<span class="badge bg-secondary">${r.category}</span>` : ''}
                    </div>
                    <div class="d-flex flex-wrap gap-1 mb-2">
                        ${r.tags && r.tags.length > 0 ? r.tags.map(t => `<span class="badge bg-info text-dark" style="font-size: 0.7em;">${t}</span>`).join('') : ''}
                    </div>
                    <p class="card-text text-muted small">${r.instructions[0]?.substring(0, 100) || ''}...</p>
                    <small class="text-primary">${r.ingredients.length} ingredients</small>
                </div>
            </div>
        `).join('');

        // Re-attach click listeners
        document.querySelectorAll('.recipe-card').forEach(card => {
            card.addEventListener('click', () => openRecipe(card.dataset.id));
        });
    }

    function toggleTagFilter(tag, btnElement) {
        if (selectedTags.includes(tag)) {
            // Remove tag
            selectedTags = selectedTags.filter(t => t !== tag);
            btnElement.classList.remove('bg-primary', 'text-white');
            btnElement.classList.add('bg-light', 'text-dark');
        } else {
            // Add tag
            selectedTags.push(tag);
            btnElement.classList.remove('bg-light', 'text-dark');
            btnElement.classList.add('bg-primary', 'text-white');
        }

        // Show/hide clear button
        const clearBtn = document.getElementById('clearTagFiltersBtn');
        clearBtn.style.display = selectedTags.length > 0 ? 'inline-block' : 'none';

        // Apply filter
        filterRecipesByTags();
    }

    function clearTagFilters() {
        selectedTags = [];
        // Reset all buttons visually
        document.querySelectorAll('#tagFilterContainer button').forEach(btn => {
            btn.classList.remove('bg-primary', 'text-white');
            btn.classList.add('bg-light', 'text-dark');
        });
        document.getElementById('clearTagFiltersBtn').style.display = 'none';
        loadRecipes(); // Reload all recipes
    }

    function filterRecipesByTags() {
        if (selectedTags.length === 0) {
            loadRecipes(); // Reload all
            return;
        }

        // Fetch all recipes again (or cache them if you want to optimize)
        fetch('/recipes')
            .then(res => res.json())
            .then(recipes => {
                // Filter: Recipe must have ALL selected tags (AND logic)
                // Change to .some() if you want ANY tag (OR logic)
                const filtered = recipes.filter(r => {
                    if (!r.tags || r.tags.length === 0) return false;
                    // Check if recipe has EVERY tag in selectedTags
                    return selectedTags.every(selectedTag => r.tags.includes(selectedTag));
                });
                renderRecipeList(filtered);
            });
    }

    async function openRecipe(id) {
        const modal = new bootstrap.Modal(document.getElementById('recipeModal'));
        const modalBody = document.getElementById('modalBody');
        const modalTitle = document.getElementById('modalTitle');
        const deleteBtn = document.getElementById('deleteBtn');
        const editBtn = document.getElementById('editBtn');

        modalBody.innerHTML = '<p class="text-center">Loading...</p>';
        modal.show();

        try {
            const res = await fetch(`/recipes/${id}`);
            if (!res.ok) throw new Error('Recipe not found');
            
            const recipe = await res.json();
            
            modalTitle.textContent = recipe.name;
            
            // Build instructions list (now an array of objects)
            const instructionsHtml = recipe.instructions.map(inst => 
                `<li><strong>Step ${inst.step_number}:</strong> ${inst.description}</li>`
            ).join('');

            // Build ingredients list
            const ingredientsHtml = recipe.ingredients.map(ing => {
                if (ing.quantity !== null) {
                    // "Flour 200 g" (name + quantity + unit)
                    return `<li>${ing.name} ${ing.quantity} ${ing.unit}</li>`;
                } else {
                    // "Salt to taste" (name + unit)
                    return `<li>${ing.name} ${ing.unit}</li>`;
                }
            }).join('');

            // Build tags list
            const tagsHtml = recipe.tags && recipe.tags.length > 0 
                ? recipe.tags.map(t => `<span class="badge bg-info text-dark me-1 mb-1">${t}</span>`).join('')
                : '<span class="text-muted">No tags</span>';

            modalBody.innerHTML = `
                <h6>Tags</h6>
                <div class="mb-3">${tagsHtml}</div>
                <h6>Ingredients (${recipe.ingredients.length})</h6>
                <ul>${ingredientsHtml || '<li>No ingredients</li>'}</ul>
                <hr>
                <h6>Instructions</h6>
                <ol>${instructionsHtml || '<li>No instructions</li>'}</ol>
            `;

            deleteBtn.onclick = () => deleteRecipe(id, modal);
            editBtn.onclick = () => startEditRecipe(recipe, modal);
        } catch (err) {
            modalBody.innerHTML = '<p class="text-danger">Error loading recipe details.</p>';
        }
    }

    async function startEditRecipe(recipe, modal) {
        modal.hide();
        
        // Populate name
        document.getElementById('name').value = recipe.name;
        
        // Set category dropdown value (empty string if no category)
        const categorySelect = document.getElementById('category');
        categorySelect.value = recipe.category || '';
        
        // Populate tags
        tags = recipe.tags || [];
        renderTags();
        
        // Populate instructions
        instructions = recipe.instructions.map(i => i.description);
        renderInstructions();
        
        // Populate ingredients
        ingredients = [...recipe.ingredients];
        const listDiv = document.getElementById('ingredientsList');
        listDiv.innerHTML = ingredients.map((ing, idx) => {
            if (ing.quantity !== null) {
                return `<div class="d-flex justify-content-between align-items-center mb-1">
                    <span>${ing.name} ${ing.quantity} ${ing.unit}</span>
                    <button class="btn btn-sm btn-danger" onclick="removeIngredient(${idx})">&times;</button>
                </div>`;
            } else {
                return `<div class="d-flex justify-content-between align-items-center mb-1">
                    <span>${ing.name} ${ing.unit}</span>
                    <button class="btn btn-sm btn-danger" onclick="removeIngredient(${idx})">&times;</button>
                </div>`;
            }
        }).join('');
        
        document.getElementById('recipeForm').scrollIntoView({ behavior: 'smooth' });
        
        // Change button to update mode
        const saveBtn = document.querySelector('#recipeForm button[type="submit"]');
        saveBtn.textContent = 'Update Recipe';
        saveBtn.classList.remove('btn-primary');
        saveBtn.classList.add('btn-warning');
        
        editingRecipeId = recipe.id;
    }

    async function saveRecipe(e) {
        e.preventDefault();
        console.log("Save triggered!");

        // Validate category (required)
        const category = document.getElementById('category').value;
        if (!category) {
            alert('Please select a category');
            return;
        }

        const payload = {
            name: document.getElementById('name').value,
            category: category,  // Use validated variable
            tags: tags,          // The tags array (can be empty)
            instructions: instructions,
            ingredients: ingredients
        };

        console.log("Payload:", payload);

        // Validate required fields
        if (!payload.name) {
            alert('Recipe name is required');
            return;
        }

        if (payload.instructions.length === 0) {
            alert('At least one instruction is required');
            return;
        }

        if (payload.ingredients.length === 0) {
            alert('At least one ingredient is required');
            return;
        }

        try {
            const url = editingRecipeId ? `/recipes/${editingRecipeId}` : '/recipes';
            const method = editingRecipeId ? 'PUT' : 'POST';
            
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            console.log("Response status:", res.status);

            if (res.ok) {
                alert(editingRecipeId ? 'Recipe updated!' : 'Recipe saved!');
                
                // Reset form
                document.getElementById('recipeForm').reset();
                instructions = [];
                ingredients = [];
                tags = [];
                renderInstructions();
                renderTags();
                document.getElementById('ingredientsList').innerHTML = '';
                
                const saveBtn = document.querySelector('#recipeForm button[type="submit"]');
                if (saveBtn) {
                    saveBtn.textContent = 'Save Recipe';
                    saveBtn.classList.remove('btn-warning');
                    saveBtn.classList.add('btn-primary');
                }
                editingRecipeId = null;
                loadRecipes();
            } else {
                const err = await res.json();
                console.error("Server error:", err);
                alert('Error: ' + err.error);
            }
        } catch (err) {
            console.error("Network error:", err);
            alert('Failed to connect to server');
        }
    }

    async function deleteRecipe(id, modal) {
        if (!confirm('Are you sure you want to delete this recipe?')) return;

        try {
            const res = await fetch(`/recipes/${id}`, { method: 'DELETE' });
            if (res.ok) {
                modal.hide();
                loadRecipes();
                alert('Recipe deleted successfully');
            } else {
                alert('Failed to delete recipe');
            }
        } catch (err) {
            alert('Error deleting recipe');
        }
    }

    async function searchByIngredient() {
        const searchTerm = document.getElementById('ingredientSearch').value;
        const matchAll = document.getElementById('matchAllCheckbox').checked;
        
        if (!searchTerm.trim()) {
            alert('Please enter at least one ingredient');
            return;
        }
        
        const matchType = matchAll ? 'all' : 'any';
        const url = `/recipes/search?ingredients=${encodeURIComponent(searchTerm)}&match=${matchType}`;
        
        try {
            const res = await fetch(url);
            const recipes = await res.json();
            const container = document.getElementById('recipesContainer');
            
            if (recipes.length === 0) {
                container.innerHTML = '<p class="text-center text-muted">No recipes found with those ingredients.</p>';
                return;
            }
            
            // Reuse your existing rendering logic
            container.innerHTML = recipes.map(r => `
                <div class="card mb-3 border-0 bg-light recipe-card" data-id="${r.id}" style="cursor: pointer;">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title mb-1">${r.name}</h5>
                            ${r.category ? `<span class="badge bg-secondary">${r.category}</span>` : ''}
                        </div>
                        <div class="d-flex flex-wrap gap-1 mb-2">
                            ${r.tags && r.tags.length > 0 ? r.tags.map(t => `<span class="badge bg-info text-dark" style="font-size: 0.7em;">${t}</span>`).join('') : ''}
                        </div>
                        <p class="card-text text-muted small">${r.instructions[0]?.substring(0, 100) || ''}...</p>
                        <small class="text-primary">${r.ingredients.length} ingredients</small>
                    </div>
                </div>
            `).join('');
            
            // Re-attach click listeners
            document.querySelectorAll('.recipe-card').forEach(card => {
                card.addEventListener('click', () => openRecipe(card.dataset.id));
            });
            
        } catch (err) {
            document.getElementById('recipesContainer').innerHTML = '<p class="text-danger">Error searching recipes.</p>';
        }
    }

</script>

{% endblock %}
