<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Recipe Manager{% endblock %}</title>
    <!-- Bootstrap 5.3+ CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <!-- Custom Dark Theme Overrides -->
    <style>
        /* Force dark background for body and html */
        html, body {
            background-color: #212529 !important; /* Bootstrap's dark bg */
            color: #fff !important;
        }
        
        /* Override any light backgrounds */
        .bg-light, .bg-white {
            background-color: #343a40 !important;
            color: #fff !important;
        }
        
        /* Ensure text colors are light */
        .text-muted {
            color: #adb5bd !important;
        }
        
        /* Card backgrounds */
        .card {
            background-color: #2b3035 !important;
            border-color: #444 !important;
            color: #fff !important;
        }
        
        .card-header {
            background-color: #343a40 !important;
            border-bottom-color: #444 !important;
        }
        
        /* Form controls */
        .form-control, .form-select {
            background-color: #2b3035 !important;
            border-color: #555 !important;
            color: #fff !important;
        }
        
        .form-control:focus, .form-select:focus {
            background-color: #2b3035 !important;
            border-color: #0d6efd !important;
            color: #fff !important;
        }
        
        /* List groups */
        .list-group-item {
            background-color: #2b3035 !important;
            border-color: #444 !important;
            color: #fff !important;
        }
        
        /* Modals */
        .modal-content {
            background-color: #2b3035 !important;
            color: #fff !important;
        }
        
        .modal-header, .modal-footer {
            background-color: #343a40 !important;
            border-color: #444 !important;
        }
    </style>
</head>


<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">My Recipes</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
